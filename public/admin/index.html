<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Halfspace — Content Editor</title>
    <style>
      :root { --color-pitch: #0B3D2E; --color-bg: #FAF7F0; }
      html, body { font-family: "Times New Roman", Times, serif; background: var(--color-bg); }
    </style>
  </head>
  <body>
    <!-- Decap CMS loads a full editor into this page.
         Netlify Identity is used for gated login so only approved
         editors (you and your friend) can publish. -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
